services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mirofish-backend
    environment:
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME}
      - ZEP_API_KEY=${ZEP_API_KEY}
      - FLASK_DEBUG=False
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: mirofish-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - traefik.http.middlewares.miroauth.basicauth.users=${BASIC_AUTH_USER}:${BASIC_AUTH_PASSWORD}
